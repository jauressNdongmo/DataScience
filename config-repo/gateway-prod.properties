server.port=8081
spring.application.name=gateway

spring.cloud.gateway.routes[0].id=agri-data
spring.cloud.gateway.routes[0].uri=lb://AGRI-DATA
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/agri-data/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[1].id=integration
spring.cloud.gateway.routes[1].uri=lb://INTEGRATION
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/integration/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[2].id=decision
spring.cloud.gateway.routes[2].uri=lb://DECISION
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/decision/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[3].id=ml-python
spring.cloud.gateway.routes[3].uri=http://ml-python:8000
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/ml/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=2

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=https://app.agriyield.example
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

app.security.enabled=false
app.security.jwt-secret=CHANGE_ME_TO_A_LONG_RANDOM_SECRET_KEY_FOR_PROD
app.security.tenant-claim=tenant_id
app.security.role-claim=roles

app.rate-limit.enabled=true
app.rate-limit.requests-per-window=90
app.rate-limit.window-seconds=60

management.endpoints.web.exposure.include=health,info,metrics
