name: Build React, Python ML and Spring Boot Microservices

on:
  push:
    branches:
      - main
      - regent
      - develop
      - Develop
  pull_request:
    branches: [main, regent, develop, Develop]

jobs:
  build-react:
    name: Build React Application
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/react

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./frontend/react/package.json

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Build React Project
        run: npm run build

  build-ml-python:
    name: Validate ML Python Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/ml-python

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ./backend/ml-python/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Imports and Syntax
        run: |
          python -m compileall app
          python -c "import fastapi, pandas, numpy, sklearn, xgboost"

  build-spring-boot:
    name: Build Spring Boot Microservices
    runs-on: ubuntu-latest
    needs: [build-react, build-ml-python]
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: discovery-server
            path: ./backend/discoveryServer
          - name: config-server
            path: ./backend/configServer
          - name: gateway
            path: ./backend/gateway
          - name: agri-data
            path: ./backend/agriData
          - name: integration
            path: ./backend/integration
          - name: decision
            path: ./backend/decision

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build ${{ matrix.service.name }}
        run: mvn -B -ntp clean package -Dspring.profiles.active=dev -DskipTests
        working-directory: ${{ matrix.service.path }}
